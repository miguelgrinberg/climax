[tox]
skip_missing_interpreters=True

[testenv]
commands=
    pip install -e .
    pytest -p no:logging --cov=climax --cov-branch --cov-report=term-missing
deps=
    pytest
    pytest-cov

[testenv:pypy3]
deps=
    pytest
    pytest-cov
commands=
    pytest -p no:logging

[testenv:flake8]
deps=
    flake8
commands=
    flake8 --exclude=".*" src/climax tests

[testenv:docs]
changedir=docs
deps=
    sphinx
allowlist_externals=
    make
commands=
    make html
